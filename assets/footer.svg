<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1118"/>
      <stop offset="100%" stop-color="#070b11"/>
    </linearGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#14202d" stroke-width="0.55"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .blink { animation: blink 1s step-end infinite; }
  </style>

  <rect width="900" height="140" fill="url(#bg)"/>
  <rect width="900" height="140" fill="url(#grid)" opacity="0.55"/>
  <rect x="10" y="10" width="880" height="120" fill="none" stroke="#213245" stroke-width="1" rx="6"/>
  <rect x="18" y="18" width="864" height="104" fill="none" stroke="#14202d" stroke-width="1" rx="4"/>

  <text x="34" y="40" font-family="'Courier New', monospace" font-size="12" fill="#6f8498">SOLARIS://ARCHIVE_NOTE</text>
  <text x="866" y="40" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#d89a3d">SIGNAL LOCK: STABLE</text>
  <line x1="28" y1="52" x2="872" y2="52" stroke="#203244" stroke-width="1"/>

  <text x="450" y="78" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#d89a3d" filter="url(#glow)">This relay stores deployable systems, not polished stories.</text>
  <text x="450" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#95a7b8">Terminals. Gateways. Node fabrics. Hardening layers. Operational kits.</text>

  <text x="40" y="118" font-family="'Courier New', monospace" font-size="11" fill="#6f8498">operator@solaris-relay:~$ archive status --signal active</text>
  <text x="430" y="118" font-family="'Courier New', monospace" font-size="11" fill="#d89a3d">relevance confirmed</text>
  <rect x="565" y="106" width="8" height="14" fill="#d89a3d" class="blink"/>
  <circle cx="846" cy="114" r="5" fill="#d89a3d" class="pulse"/>
</svg>
