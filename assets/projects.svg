<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f16"/>
      <stop offset="100%" stop-color="#0f1722"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d89a3d"/>
      <stop offset="100%" stop-color="#ffb357"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121c28"/>
      <stop offset="100%" stop-color="#0c141d"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#162231" stroke-width="0.6"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
    @keyframes sweep { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
    .card1 { animation: fadeUp .45s ease-out forwards; }
    .card2 { animation: fadeUp .45s ease-out .1s forwards; opacity: 0; }
    .card3 { animation: fadeUp .45s ease-out .2s forwards; opacity: 0; }
    .card4 { animation: fadeUp .45s ease-out .3s forwards; opacity: 0; }
    .card5 { animation: fadeUp .45s ease-out .4s forwards; opacity: 0; }
    .card6 { animation: fadeUp .45s ease-out .5s forwards; opacity: 0; }
    .pulse { animation: pulse 2.2s ease-in-out infinite; }
    .dash { stroke-dasharray: 6 6; animation: sweep 1s linear infinite; }
  </style>

  <rect width="900" height="560" fill="url(#bg)"/>
  <rect width="900" height="560" fill="url(#grid)" opacity="0.55"/>
  <rect x="10" y="10" width="880" height="540" fill="none" stroke="#213245" stroke-width="1" rx="6"/>
  <rect x="18" y="18" width="864" height="524" fill="none" stroke="#14202d" stroke-width="1" rx="4"/>

  <text x="34" y="40" font-family="'Courier New', monospace" font-size="12" fill="#6f8498">SOLARIS://DEPLOYED_MODULES</text>
  <text x="866" y="40" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#d89a3d">RELAY STATUS: ACTIVE</text>
  <line x1="28" y1="52" x2="872" y2="52" stroke="#203244" stroke-width="1"/>
  <text x="450" y="86" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#d89a3d" filter="url(#glow)">// FLAGSHIP MODULES — ENDFIELD OPERATION NODE</text>

  <g class="card1">
    <rect x="30" y="110" width="260" height="180" rx="6" fill="url(#steel)" stroke="#2a4259"/>
    <rect x="30" y="110" width="260" height="4" fill="url(#amber)"/>
    <text x="46" y="138" font-family="'Courier New', monospace" font-size="18" fill="#eef4fb">CICADA // M-01</text>
    <text x="46" y="158" font-family="'Courier New', monospace" font-size="11" fill="#d89a3d">ENTRY-LAYER DEPLOYMENT INTERFACE</text>
    <text x="46" y="188" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">One-click launcher for OpenClaw</text>
    <text x="46" y="204" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">built to collapse install friction</text>
    <text x="46" y="220" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">into an actually usable starting point.</text>
    <text x="46" y="250" font-family="'Courier New', monospace" font-size="10" fill="#6f8498">ROLE</text>
    <text x="94" y="250" font-family="'Courier New', monospace" font-size="10" fill="#cfd7df">front door / onboarding / launch</text>
    <line x1="46" y1="264" x2="244" y2="264" stroke="#203244" class="dash"/>
    <circle cx="248" cy="250" r="5" fill="#d89a3d" class="pulse"/>
  </g>

  <g class="card2">
    <rect x="320" y="110" width="260" height="180" rx="6" fill="url(#steel)" stroke="#2a4259"/>
    <rect x="320" y="110" width="260" height="4" fill="#7cb6ff"/>
    <text x="336" y="138" font-family="'Courier New', monospace" font-size="18" fill="#eef4fb">kaku-shell // T-02</text>
    <text x="336" y="158" font-family="'Courier New', monospace" font-size="11" fill="#7cb6ff">TERMINAL OPERATION LAYER</text>
    <text x="336" y="188" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">PowerShell-based AI coding terminal</text>
    <text x="336" y="204" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">for error analysis, tool setup,</text>
    <text x="336" y="220" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">and repeatable operator workflows.</text>
    <text x="336" y="250" font-family="'Courier New', monospace" font-size="10" fill="#6f8498">ROLE</text>
    <text x="384" y="250" font-family="'Courier New', monospace" font-size="10" fill="#cfd7df">terminal / control / execution</text>
    <line x1="336" y1="264" x2="534" y2="264" stroke="#203244" class="dash"/>
    <circle cx="538" cy="250" r="5" fill="#7cb6ff" class="pulse"/>
  </g>

  <g class="card3">
    <rect x="610" y="110" width="260" height="180" rx="6" fill="url(#steel)" stroke="#2a4259"/>
    <rect x="610" y="110" width="260" height="4" fill="#86d39b"/>
    <text x="626" y="138" font-family="'Courier New', monospace" font-size="18" fill="#eef4fb">claw-mesh // N-03</text>
    <text x="626" y="158" font-family="'Courier New', monospace" font-size="11" fill="#86d39b">DISTRIBUTED NODE FABRIC</text>
    <text x="626" y="188" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">WireGuard-backed connectivity</text>
    <text x="626" y="204" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">and orchestration layer for</text>
    <text x="626" y="220" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">distributed OpenClaw nodes.</text>
    <text x="626" y="250" font-family="'Courier New', monospace" font-size="10" fill="#6f8498">ROLE</text>
    <text x="674" y="250" font-family="'Courier New', monospace" font-size="10" fill="#cfd7df">mesh / routing / expansion</text>
    <line x1="626" y1="264" x2="824" y2="264" stroke="#203244" class="dash"/>
    <circle cx="828" cy="250" r="5" fill="#86d39b" class="pulse"/>
  </g>

  <g class="card4">
    <rect x="30" y="320" width="260" height="180" rx="6" fill="url(#steel)" stroke="#2a4259"/>
    <rect x="30" y="320" width="260" height="4" fill="#b892ff"/>
    <text x="46" y="348" font-family="'Courier New', monospace" font-size="18" fill="#eef4fb">free-llm-hub // G-04</text>
    <text x="46" y="368" font-family="'Courier New', monospace" font-size="11" fill="#b892ff">MULTI-GATEWAY ACCESS LAYER</text>
    <text x="46" y="398" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">One-command launch layer for</text>
    <text x="46" y="414" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">multiple free AI gateways behind</text>
    <text x="46" y="430" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">a simplified OpenAI-compatible API.</text>
    <text x="46" y="460" font-family="'Courier New', monospace" font-size="10" fill="#6f8498">ROLE</text>
    <text x="94" y="460" font-family="'Courier New', monospace" font-size="10" fill="#cfd7df">gateway / compatibility / access</text>
    <line x1="46" y1="474" x2="244" y2="474" stroke="#203244" class="dash"/>
    <circle cx="248" cy="460" r="5" fill="#b892ff" class="pulse"/>
  </g>

  <g class="card5">
    <rect x="320" y="320" width="260" height="180" rx="6" fill="url(#steel)" stroke="#2a4259"/>
    <rect x="320" y="320" width="260" height="4" fill="#ff7b8b"/>
    <text x="336" y="348" font-family="'Courier New', monospace" font-size="18" fill="#eef4fb">openclaw-hardener // S-05</text>
    <text x="336" y="368" font-family="'Courier New', monospace" font-size="11" fill="#ff7b8b">INTEGRITY AND HARDENING PROTOCOL</text>
    <text x="336" y="398" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">Security checks and hardening</text>
    <text x="336" y="414" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">for OpenClaw deployments before</text>
    <text x="336" y="430" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">public exposure turns fatal.</text>
    <text x="336" y="460" font-family="'Courier New', monospace" font-size="10" fill="#6f8498">ROLE</text>
    <text x="384" y="460" font-family="'Courier New', monospace" font-size="10" fill="#cfd7df">audit / hardening / exposure control</text>
    <line x1="336" y1="474" x2="534" y2="474" stroke="#203244" class="dash"/>
    <circle cx="538" cy="460" r="5" fill="#ff7b8b" class="pulse"/>
  </g>

  <g class="card6">
    <rect x="610" y="320" width="260" height="180" rx="6" fill="url(#steel)" stroke="#2a4259"/>
    <rect x="610" y="320" width="260" height="4" fill="#d89a3d"/>
    <text x="626" y="348" font-family="'Courier New', monospace" font-size="18" fill="#eef4fb">claw-rice // W-06</text>
    <text x="626" y="368" font-family="'Courier New', monospace" font-size="11" fill="#d89a3d">WORKFLOW OPERATING KIT</text>
    <text x="626" y="398" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">Battle-tested setup pack for</text>
    <text x="626" y="414" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">Claude and OpenClaw workflows,</text>
    <text x="626" y="430" font-family="'Courier New', monospace" font-size="11" fill="#96a6b6">rules, skills, and agents.</text>
    <text x="626" y="460" font-family="'Courier New', monospace" font-size="10" fill="#6f8498">ROLE</text>
    <text x="674" y="460" font-family="'Courier New', monospace" font-size="10" fill="#cfd7df">workflow / config / operator kit</text>
    <line x1="626" y1="474" x2="824" y2="474" stroke="#203244" class="dash"/>
    <circle cx="828" cy="460" r="5" fill="#d89a3d" class="pulse"/>
  </g>

  <line x1="290" y1="200" x2="320" y2="200" stroke="#27405a" class="dash"/>
  <line x1="580" y1="200" x2="610" y2="200" stroke="#27405a" class="dash"/>
  <line x1="160" y1="290" x2="160" y2="320" stroke="#27405a" class="dash"/>
  <line x1="450" y1="290" x2="450" y2="320" stroke="#27405a" class="dash"/>
  <line x1="740" y1="290" x2="740" y2="320" stroke="#27405a" class="dash"/>
</svg>
